<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORD ROUTE EXPLORER ULTRA ENGINE Pro</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }
    .dark .glass {
      background: rgba(0,0,0,0.4);
    }
  </style>
</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-4">

  <h1 class="text-center text-xl font-black tracking-widest mb-4">
    WORD ROUTE EXPLORER<br>ULTRA ENGINE Pro
  </h1>

  <!-- 入力欄 -->
  <div class="space-y-3">

    <div>
      <label class="text-[10px] font-black">開始単語</label>
      <input id="sw" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">開始字</label>
      <input id="sc" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">終了字</label>
      <input id="ec" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">必須文字</label>
      <input id="mc" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">全語開始字</label>
      <input id="asc" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">全語終了字</label>
      <input id="aec" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">使用不可文字</label>
      <input id="exc" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">禁止開始文字</label>
      <input id="bsc" type="text" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div>
      <label class="text-[10px] font-black">最大語数</label>
      <input id="ml" type="number" value="5" class="w-full p-2 rounded bg-white dark:bg-slate-800">
    </div>

    <div class="flex items-center gap-2">
      <input id="allow_daku" type="checkbox">
      <label class="text-[10px] font-black">濁点許可</label>
    </div>

    <div class="flex items-center gap-2">
      <input id="allow_handaku" type="checkbox">
      <label class="text-[10px] font-black">半濁点許可</label>
    </div>

    <div class="flex items-center gap-2">
      <input id="unify_small" type="checkbox">
      <label class="text-[10px] font-black">小文字統一</label>
    </div>

    <div class="flex items-center gap-2">
      <input id="exclude_conjugate" type="checkbox">
      <label class="text-[10px] font-black">共役排除</label>
    </div>

    <div class="flex items-center gap-2">
      <input id="timeout_enabled" type="checkbox">
      <label class="text-[10px] font-black">タイムアウト</label>
      <input id="timeout_sec" type="number" value="15" class="w-20 p-1 rounded bg-white dark:bg-slate-800">
    </div>

    <div class="flex items-center gap-2">
      <input id="limit_enabled" type="checkbox">
      <label class="text-[10px] font-black">件数制限</label>
      <input id="limit" type="number" value="0" class="w-20 p-1 rounded bg-white dark:bg-slate-800">
    </div>

    <div class="flex items-center gap-2">
      <input id="realtime_enabled" type="checkbox">
      <label class="text-[10px] font-black">リアルタイム件数表示</label>
    </div>

  </div>

  <!-- Top N Copy + Explore -->
  <div class="flex items-center justify-between pt-4">
    <button type="button" onclick="copyTopN()"
      class="px-3 py-2 rounded-2xl bg-blue-600/10 text-blue-600 text-[10px] font-black uppercase tracking-widest">
      Top N Copy
    </button>

    <!-- ★ Explore ボタン（正しい位置） -->
    <button type="button" id="btn" onclick="run()"
      class="px-6 py-2.5 rounded-2xl bg-blue-600 text-white text-[11px] font-black uppercase tracking-[0.2em] shadow">
      Explore
    </button>
  </div>

  <!-- 結果 -->
  <div id="stats" class="text-center text-[11px] font-black mt-3 hidden"></div>
  <div id="res" class="mt-4 space-y-3"></div>

  <!-- Dictionary ボタン -->
  <button type="button"
    onclick="document.getElementById('dict-list').scrollIntoView()"
    class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-blue-500 text-white px-4 py-2 rounded">
    Dictionary
  </button>

  <!-- 辞書UI -->
  <div id="dict-list" class="grid grid-cols-2 gap-2 mt-10"></div>

  <!-- Scripts -->
  <script src="dictionary.js"></script>
  <script src="engine.js"></script>

  <!-- 読み込み確認 -->
  <script>
    alert("engine = " + (typeof run) + "\n" +
          "dict = " + (typeof window.DICTIONARY));
  </script>

  <!-- エラー表示 -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      alert("ERROR: " + msg + "\n" + src + ":" + line);
    };
  </script>

</body>
</html>
